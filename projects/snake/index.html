<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake — Dev Arcade</title>
<link rel="stylesheet" href="../_shared/arcade.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="arcade-app">
    <div class="arcade-header">
      <div class="arcade-title">Snake<span class="dim">.</span></div>
      <span class="arcade-kicker">Canvas · JavaScript</span>
      <div class="arcade-actions" id="actions"></div>
    </div>

    <div class="arcade-flex">
      <div class="arcade-stage" id="stage">
        <canvas id="game" width="440" height="440"></canvas>

        <!-- Menu overlay -->
        <div class="overlay" id="menu">
          <div class="overlay-card">
            <h1>Snake<span class="accent">.</span></h1>
            <div class="overlay-sub">Eat orbs. Don't crash. Pick a speed.</div>
            <div class="mode-grid" id="modeGrid">
              <button class="mode-btn" data-mode="chill"><div class="m-title">Chill</div><div class="m-desc">Slow & forgiving</div></button>
              <button class="mode-btn selected" data-mode="normal"><div class="m-title">Normal</div><div class="m-desc">Classic pace</div></button>
              <button class="mode-btn" data-mode="fast"><div class="m-title">Fast</div><div class="m-desc">Quick reflexes</div></button>
              <button class="mode-btn" data-mode="walls"><div class="m-title">No Walls</div><div class="m-desc">Wrap-around</div></button>
            </div>
            <button class="btn btn-primary" id="startBtn">Start →</button>
            <div class="overlay-hint">Arrows / WASD · P pause</div>
          </div>
        </div>

        <!-- Pause overlay -->
        <div class="overlay hidden" id="pause">
          <div class="overlay-card">
            <h2>Paused</h2>
            <button class="btn btn-primary" id="resumeBtn">Resume</button>
            <button class="btn btn-ghost" id="quitBtn">Quit to menu</button>
          </div>
        </div>

        <!-- Game over overlay -->
        <div class="overlay hidden" id="gameover">
          <div class="overlay-card">
            <h2>Game Over</h2>
            <span class="new-best hidden" id="newBest">New Best</span>
            <div class="overlay-stats">
              <div><span class="lbl">Score</span><span class="val" id="goScore">0</span></div>
              <div><span class="lbl">Length</span><span class="val" id="goLen">3</span></div>
              <div><span class="lbl">Best</span><span class="val" id="goBest">0</span></div>
            </div>
            <button class="btn btn-primary" id="retryBtn">Play again</button>
            <button class="btn btn-ghost" id="menuBtn">Main menu</button>
          </div>
        </div>
      </div>

      <aside class="arcade-panel">
        <div class="stat-box">
          <div class="stat-label">Score</div>
          <div class="stat-value or" id="score">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Length</div>
          <div class="stat-value" id="length">3</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Best</div>
          <div class="stat-value cy" id="best">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Mode</div>
          <div class="stat-value" id="modeBadge" style="font-size:14px">Normal</div>
        </div>
        <div class="controls-list">
          <div class="controls-list-title">Controls</div>
          <div><span class="kbd">↑</span><span class="kbd">↓</span><span class="kbd">←</span><span class="kbd">→</span> move</div>
          <div><span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span> move</div>
          <div><span class="kbd">P</span> pause</div>
        </div>
      </aside>
    </div>
  </div>

  <script src="../_shared/arcade.js"></script>
  <script src="game.js"></script>
</body>
</html>
