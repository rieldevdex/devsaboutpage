<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tetris — Dev Arcade</title>
<link rel="stylesheet" href="../_shared/arcade.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="arcade-app wrap">
    <div class="arcade-header">
      <div class="arcade-title">Classic<span class="accent"> Tetris</span><span class="dim">.</span></div>
      <span class="arcade-kicker">Canvas · JavaScript</span>
      <div class="arcade-actions" id="actions"></div>
    </div>

    <div class="arcade-flex">
      <div class="arcade-stage" id="stage">
        <canvas id="board" width="240" height="480"></canvas>

        <div id="overlay" class="overlay hidden">
          <div class="overlay-card">
            <h2 id="overlayText">Paused</h2>
          </div>
        </div>

        <div id="menu" class="overlay hidden">
          <div class="overlay-card">
            <h2>Paused</h2>
            <div class="overlay-stats">
              <div><span class="lbl">Score</span><span class="val" id="menuScore">0</span></div>
              <div><span class="lbl">Lines</span><span class="val" id="menuLines">0</span></div>
              <div><span class="lbl">Level</span><span class="val" id="menuLevel">1</span></div>
            </div>
            <button id="btnResume" class="btn btn-primary">Resume</button>
            <button id="btnSave"   class="btn btn-ghost">Save Score</button>
            <button id="btnNew"    class="btn btn-ghost">New Game</button>
            <div class="hs-title">High Scores</div>
            <ol id="highScores" class="hs-list"></ol>
          </div>
        </div>
      </div>

      <aside class="arcade-panel">
        <div class="stat-box">
          <div class="stat-label">Hold</div>
          <canvas id="hold" width="120" height="120" style="width:100%;display:block;background:rgba(0,0,0,0.2);border-radius:6px"></canvas>
        </div>
        <div class="stat-box">
          <div class="stat-label">Next</div>
          <canvas id="next" width="120" height="120" style="width:100%;display:block;background:rgba(0,0,0,0.2);border-radius:6px"></canvas>
        </div>
        <div class="stat-box">
          <div class="stat-label">Score</div>
          <div class="stat-value or" id="score">0</div>
          <div id="combo" class="fb-combo hidden">x1</div>
        </div>
        <div class="stat-box"><div class="stat-label">Lines</div><div class="stat-value cy" id="lines">0</div></div>
        <div class="stat-box"><div class="stat-label">Level</div><div class="stat-value" id="level">1</div></div>
        <button id="restart" class="btn btn-ghost">New Game</button>
        <div class="controls-list">
          <div class="controls-list-title">Controls</div>
          <div><span class="kbd">←</span><span class="kbd">→</span> move</div>
          <div><span class="kbd">↑</span> rotate</div>
          <div><span class="kbd">↓</span> soft drop</div>
          <div><span class="kbd">Space</span> hard drop</div>
          <div><span class="kbd">C</span> hold</div>
          <div><span class="kbd">P</span> pause · <span class="kbd">Esc</span> menu</div>
        </div>
      </aside>
    </div>
  </div>

  <script src="../_shared/arcade.js"></script>
  <script>Arcade.attachBackLink();</script>
  <script src="game.js"></script>
</body>
</html>
